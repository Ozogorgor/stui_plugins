name = "Spotify"
description = "Stream Spotify using OAuth and Spotify Connect"
version = "0.1.0"
plugin_type = "provider"

[network]
hosts = ["accounts.spotify.com", "api.spotify.com"]

[[config]]
key      = "client_id"
label    = "Client ID (optional)"
hint     = "Your own Spotify app client ID from developer.spotify.com. Leave blank to use the built-in ID."
required = false
masked   = false
