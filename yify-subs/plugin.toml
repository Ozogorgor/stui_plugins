# yify-subs — plugin manifest
# Subtitle scraper for YIFY movie releases

[plugin]
name        = "yify-subs"
version     = "0.1.0"
abi_version = 1
description = "Subtitle scraper for YIFY movie releases"
tags        = ["subtitles", "movies"]

[capabilities.subtitles]
# Opaque capability — _extra HashMap catch-all.

[permissions]
network = ["yifysubtitles.ch", "www.yifysubtitles.ch", "yifysubtitles.com", "yts-subs.com", "yifysubtitles.org"]

[rate_limit]
requests_per_second = 1
burst               = 3

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://github.com/Ozogorgor/stui_plugins"
