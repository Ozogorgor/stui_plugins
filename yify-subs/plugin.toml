# yify-subs — plugin manifest
# Install at: ~/.stui/plugins/yify-subs/

[plugin]
name        = "yify-subs"
version     = "0.1.0"
abi_version = 1
description = "YIFY Subtitles — movie subtitles by IMDB ID"
tags        = ["subtitles", "movies"]

[capabilities]
search = true
resolve = true

[capabilities.subtitles]

[config]

[permissions]
network = true

[meta]
author = "stui"
