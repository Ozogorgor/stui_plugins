# prowlarr-provider — plugin manifest

[plugin]
name        = "prowlarr-provider"
version     = "0.1.0"
abi_version = 1
description = "Search torrents via a Prowlarr indexer"
tags        = ["streams", "movies", "tv", "anime", "music"]

[capabilities]
streams = true

# Stream-only — do NOT advertise catalog capability. The catalog
# trending fan-out fires on every Series/Movies tab load with an
# empty query; if Prowlarr answers it, raw torrent file names like
# "S05E05 1080p WEB-DL" leak into the catalog as fake series entries.
[capabilities.catalog]
kinds  = []
search = false

[env]
PROWLARR_URL     = "http://localhost:9696"
PROWLARR_API_KEY = ""

[[config]]
key       = "url"
label     = "Prowlarr URL"
hint      = "Base URL of your Prowlarr instance"
masked    = false
required  = true
default   = "http://localhost:9696"
env_var   = "PROWLARR_URL"

[[config]]
key       = "api_key"
label     = "Prowlarr API Key"
hint      = "Prowlarr → Settings → General → API Key"
masked    = true
required  = true
env_var   = "PROWLARR_API_KEY"

[permissions]
network = ["localhost", "127.0.0.1", "::1"]

[search]
movie_categories  = "2000,2010,2020"
series_categories = "5000,5040,5070"
music_categories  = "3000,3010,3040"

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://github.com/Ozogorgor/stui_plugins"
