# subscene — plugin manifest
# Subtitle scraper for subscene.com

[plugin]
name        = "subscene"
version     = "0.1.0"
abi_version = 1
description = "Subtitle scraper for subscene.com"
tags        = ["subtitles", "movies", "tv"]

[capabilities.subtitles]
# Opaque capability — _extra HashMap catch-all.

[permissions]
network = ["subscene.com", "www.subscene.com"]

[rate_limit]
requests_per_second = 1
burst               = 3

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://github.com/Ozogorgor/stui_plugins"
