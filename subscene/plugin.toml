# subscene — plugin manifest
# Install at: ~/.stui/plugins/subscene/

[plugin]
name        = "subscene"
version     = "0.1.0"
abi_version = 1
description = "Subscene — subtitle search and download"
tags        = ["subtitles", "movies", "tv", "anime"]

[capabilities]
search = true
resolve = true

[capabilities.subtitles]

[config]

[permissions]
network = true

[meta]
author = "stui"
